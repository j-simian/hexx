<!doctype html>
<html>

<head>
  <title>hexx</title>
  <link rel="stylesheet" type="text/css" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&family=Funnel+Sans:ital,wght@0,300..800;1,300..800&display=swap"
    rel="stylesheet">
</head>

<body>
  <div class="state-container" data-state="lobby" hidden>
    <div class="form-container">
      <form>
        <h1>hexx</h1>
        <button id="btn-create" type="button">Create room</button>
        <div class="join-row">
          <input id="join-code" type="text"></input>
          <button id="btn-join" type="button">Join</button>
        </div>
      </form>
    </div>
  </div>
  <div class="state-container" data-state="game" hidden>
    <div class="status-bar">
      <div class="status-left">
        <h1 class="header-text">hexx</h1>
      </div>
      <div class="status-right">
        <span id="opponent-status" class="status-elt">
          <span>No opponent connected</span>
          <span id="join-code-preview"></span>
          <button id="copy-join-link">Copy link</button>
        </span>
        <span id="turn-indicator" class="status-elt">Your turn</span>
        <span id="moves-remaining" class="status-elt">2 moves remaining</span>
      </div>
    </div>
    <div class="game-container">
      <canvas id="canvas"></canvas>
    </div>
  </div>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="src/main.js" type="module"></script>
</body>

</html>
